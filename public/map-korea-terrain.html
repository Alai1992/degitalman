<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>朝鲜半岛地形图 - 历史地图</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
      background: linear-gradient(135deg, #1a0a0a 0%, #2d1810 50%, #1a0a0a 100%);
      min-height: 100vh;
      color: #e8d5b7;
    }
    
    /* 战火背景 */
    .war-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      opacity: 0.3;
      background: 
        radial-gradient(ellipse at top, rgba(139, 0, 0, 0.4) 0%, transparent 50%),
        radial-gradient(ellipse at bottom, rgba(139, 69, 19, 0.3) 0%, transparent 50%);
    }
    
    /* 页面头部 */
    .page-header {
      background: linear-gradient(135deg, rgba(139, 0, 0, 0.9), rgba(80, 20, 20, 0.95));
      border-bottom: 2px solid #daa520;
      padding: 1.5rem 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .header-content {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    
    .back-button {
      background: linear-gradient(135deg, #daa520, #b8860b);
      border: none;
      color: #1a0a0a;
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .back-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(218, 165, 32, 0.4);
    }
    
    .page-title {
      flex: 1;
      text-align: center;
    }
    
    .page-title h1 {
      font-size: 1.8rem;
      color: #daa520;
      text-shadow: 0 0 10px rgba(218, 165, 32, 0.5);
    }
    
    .page-title .subtitle {
      font-size: 0.9rem;
      color: #c9a86c;
      margin-top: 0.3rem;
    }
    
    .header-spacer {
      width: 100px;
    }
    
    /* 主内容区 */
    .main-content {
      max-width: 1400px;
      margin: 2rem auto;
      padding: 0 1.5rem;
    }
    
    /* 地图容器 */
    .map-container {
      background: linear-gradient(135deg, rgba(45, 24, 16, 0.95), rgba(30, 15, 10, 0.98));
      border: 2px solid #8b6914;
      border-radius: 15px;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }
    
    .map-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #8b6914, #daa520, #8b6914);
    }
    
    /* SVG地图 */
    .map-svg-container {
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
      background: #f5f0e6;
      border-radius: 10px;
      padding: 1rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }
    
    .map-svg {
      width: 100%;
      height: auto;
      display: block;
    }
    
    /* 地图图例 */
    .map-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-top: 1.5rem;
      padding: 1rem;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 10px;
    }
    
    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0.8rem;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 5px;
    }
    
    .legend-icon {
      width: 20px;
      height: 20px;
      border-radius: 50%;
    }
    
    .legend-icon.city { background: #e74c3c; }
    .legend-icon.mountain { background: #27ae60; }
    .legend-icon.river { background: #3498db; }
    .legend-icon.border { background: linear-gradient(90deg, #e74c3c 50%, #3498db 50%); }
    
    .legend-text {
      font-size: 0.9rem;
      color: #e8d5b7;
    }
    
    /* 信息面板 */
    .info-panel {
      margin-top: 2rem;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
    }
    
    .info-card {
      background: rgba(45, 24, 16, 0.9);
      border: 1px solid #8b6914;
      border-radius: 10px;
      padding: 1.5rem;
    }
    
    .info-card h3 {
      color: #daa520;
      font-size: 1.2rem;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px dashed #8b6914;
    }
    
    .info-card ul {
      list-style: none;
      padding: 0;
    }
    
    .info-card li {
      padding: 0.5rem 0;
      color: #d4c4a8;
      border-bottom: 1px dotted rgba(139, 105, 20, 0.3);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .info-card li:last-child {
      border-bottom: none;
    }
    
    .info-card li::before {
      content: '◆';
      color: #daa520;
      font-size: 0.6rem;
    }
    
    /* 装饰元素 */
    .corner-decoration {
      position: absolute;
      width: 60px;
      height: 60px;
      border: 2px solid #daa520;
      opacity: 0.3;
    }
    
    .corner-decoration.top-left {
      top: 10px;
      left: 10px;
      border-right: none;
      border-bottom: none;
    }
    
    .corner-decoration.top-right {
      top: 10px;
      right: 10px;
      border-left: none;
      border-bottom: none;
    }
    
    .corner-decoration.bottom-left {
      bottom: 10px;
      left: 10px;
      border-right: none;
      border-top: none;
    }
    
    .corner-decoration.bottom-right {
      bottom: 10px;
      right: 10px;
      border-left: none;
      border-top: none;
    }
    
    /* 响应式 */
    @media (max-width: 768px) {
      .page-title h1 {
        font-size: 1.4rem;
      }
      
      .main-content {
        padding: 0 1rem;
      }
      
      .map-container {
        padding: 1rem;
      }
      
      .info-panel {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="war-background"></div>
  
  <header class="page-header">
    <div class="header-content">
      <button class="back-button" onclick="goBack()">
        <span>←</span>
        <span>返回</span>
      </button>
      <div class="page-title">
        <h1>🗺️ 朝鲜半岛地形图</h1>
        <div class="subtitle">抗美援朝战争历史地图</div>
      </div>
      <div class="header-spacer"></div>
    </div>
  </header>
  
  <main class="main-content">
    <div class="map-container">
      <div class="corner-decoration top-left"></div>
      <div class="corner-decoration top-right"></div>
      <div class="corner-decoration bottom-left"></div>
      <div class="corner-decoration bottom-right"></div>
      
      <!-- SVG朝鲜半岛地形图 -->
      <div class="map-svg-container">
        <svg class="map-svg" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
          <!-- 背景海洋 -->
          <rect width="800" height="600" fill="#e8f4f8"/>
          
          <!-- 朝鲜半岛形状 -->
          <path d="M150,80 Q180,60 220,70 L260,50 Q300,40 340,55 L380,45 Q420,35 460,50 L500,40 Q540,30 580,50 L620,45 Q660,40 700,60 L720,80 Q750,100 760,140 L780,180 Q790,220 780,260 L760,300 Q740,340 700,360 L660,380 Q620,400 580,390 L540,410 Q500,420 460,400 L420,380 Q380,360 340,380 L300,370 Q260,360 220,380 L180,370 Q140,360 120,330 L100,290 Q80,250 90,210 L110,170 Q130,130 150,80 Z" 
                fill="#c9d6a5" stroke="#8b7355" stroke-width="2"/>
          
          <!-- 38线 -->
          <line x1="150" y1="180" x2="750" y2="200" stroke="#e74c3c" stroke-width="3" stroke-dasharray="10,5"/>
          <text x="700" y="175" fill="#e74c3c" font-size="12" font-weight="bold">38°线</text>
          
          <!-- 山脉标注 -->
          <g class="mountains">
            <!-- 白头山/长白山 -->
            <polygon points="580,120 600,100 620,120 610,130 590,130" fill="#6b8e23" stroke="#556b2f" stroke-width="1"/>
            <text x="600" y="95" fill="#2d5016" font-size="11" text-anchor="middle" font-weight="bold">白头山</text>
            <text x="600" y="145" fill="#2d5016" font-size="9" text-anchor="middle">2718m</text>
            
            <!-- 妙香山 -->
            <polygon points="420,160 440,145 460,160 450,170 430,170" fill="#6b8e23" stroke="#556b2f" stroke-width="1"/>
            <text x="440" y="140" fill="#2d5016" font-size="10" text-anchor="middle">妙香山</text>
            
            <!-- 狼林山脉 -->
            <rect x="480" y="150" width="80" height="30" rx="10" fill="#6b8e23" stroke="#556b2f" stroke-width="1"/>
            <text x="520" y="170" fill="#2d5016" font-size="10" text-anchor="middle">狼林山脉</text>
          </g>
          
          <!-- 河流 -->
          <g class="rivers">
            <!-- 鸭绿江 -->
            <path d="M520,60 Q480,100 450,140 Q420,180 380,210 Q340,240 300,270" 
                  fill="none" stroke="#3498db" stroke-width="4" stroke-linecap="round"/>
            <text x="520" y="50" fill="#2980b9" font-size="10" font-weight="bold">鸭绿江</text>
            
            <!-- 图们江 -->
            <path d="M660,60 Q640,90 620,130 Q600,170 580,200" 
                  fill="none" stroke="#3498db" stroke-width="3" stroke-linecap="round"/>
            <text x="670" y="50" fill="#2980b9" font-size="10" font-weight="bold">图们江</text>
            
            <!-- 大同江 -->
            <path d="M340,220 Q320,260 300,300 Q280,340 260,370" 
                  fill="none" stroke="#3498db" stroke-width="3" stroke-linecap="round"/>
            <text x="345" y="215" fill="#2980b9" font-size="10" font-weight="bold">大同江</text>
            
            <!-- 清川江 -->
            <path d="M400,180 Q380,210 360,240 Q340,270 320,290" 
                  fill="none" stroke="#3498db" stroke-width="2" stroke-linecap="round"/>
            <text x="405" y="175" fill="#2980b9" font-size="9">清川江</text>
            
            <!-- 临津江 -->
            <path d="M200,250 Q220,280 240,300" 
                  fill="none" stroke="#3498db" stroke-width="2" stroke-linecap="round"/>
            <text x="185" y="245" fill="#2980b9" font-size="9">临津江</text>
          </g>
          
          <!-- 主要城市 -->
          <g class="cities">
            <!-- 平壤 -->
            <circle cx="320" cy="260" r="12" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
            <circle cx="320" cy="260" r="6" fill="#fff"/>
            <text x="320" y="285" fill="#1a1a2e" font-size="13" text-anchor="middle" font-weight="bold">平壤</text>
            
            <!-- 首尔/汉城 -->
            <circle cx="180" cy="320" r="14" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
            <circle cx="180" cy="320" r="7" fill="#fff"/>
            <text x="180" y="345" fill="#1a1a2e" font-size="13" text-anchor="middle" font-weight="bold">首尔</text>
            
            <!-- 新义州 -->
            <circle cx="460" cy="140" r="8" fill="#f39c12" stroke="#d68910" stroke-width="1"/>
            <text x="460" y="160" fill="#1a1a2e" font-size="10" text-anchor="middle">新义州</text>
            
            <!-- 釜山 -->
            <circle cx="140" cy="400" r="8" fill="#f39c12" stroke="#d68910" stroke-width="1"/>
            <text x="140" y="420" fill="#1a1a2e" font-size="10" text-anchor="middle">釜山</text>
            
            <!-- 元山 -->
            <circle cx="380" cy="220" r="7" fill="#f39c12" stroke="#d68910" stroke-width="1"/>
            <text x="380" y="240" fill="#1a1a2e" font-size="9" text-anchor="middle">元山</text>
            
            <!-- 开城 -->
            <circle cx="210" cy="280" r="6" fill="#f39c12" stroke="#d68910" stroke-width="1"/>
            <text x="210" y="300" fill="#1a1a2e" font-size="9" text-anchor="middle">开城</text>
            
            <!-- 新安州 -->
            <circle cx="360" cy="270" r="6" fill="#f39c12" stroke="#d68910" stroke-width="1"/>
            <text x="360" y="290" fill="#1a1a2e" font-size="9" text-anchor="middle">新安州</text>
            
            <!-- 安州 -->
            <circle cx="400" cy="250" r="6" fill="#f39c12" stroke="#d68910" stroke-width="1"/>
            <text x="400" y="270" fill="#1a1a2e" font-size="9" text-anchor="middle">安州</text>
          </g>
          
          <!-- 战略要点 -->
          <g class="strategic-points">
            <!-- 长津湖 -->
            <rect x="520" y="140" width="40" height="25" rx="5" fill="rgba(52, 152, 219, 0.5)" stroke="#3498db" stroke-width="1" stroke-dasharray="3,2"/>
            <text x="540" y="157" fill="#1a1a2e" font-size="8" text-anchor="middle">长津湖</text>
            
            <!-- 砥平里 -->
            <circle cx="260" cy="260" r="5" fill="none" stroke="#9b59b6" stroke-width="2"/>
            <text x="260" y="280" fill="#7d3c98" font-size="8" text-anchor="middle">砥平里</text>
            
            <!-- 上甘岭 -->
            <circle cx="340" cy="290" r="5" fill="none" stroke="#9b59b6" stroke-width="2"/>
            <text x="340" y="310" fill="#7d3c98" font-size="8" text-anchor="middle">上甘岭</text>
            
            <!-- 铁原 -->
            <circle cx="240" cy="240" r="5" fill="none" stroke="#9b59b6" stroke-width="2"/>
            <text x="240" y="230" fill="#7d3c98" font-size="8" text-anchor="middle">铁原</text>
          </g>
          
          <!-- 国界标注 -->
          <g class="borders">
            <!-- 中朝边境 -->
            <line x1="480" y1="40" x2="620" y2="210" stroke="#27ae60" stroke-width="3"/>
            <text x="650" y="100" fill="#27ae60" font-size="10" font-weight="bold">中国</text>
            
            <!-- 朝苏边境 -->
            <line x1="620" y1="40" x2="700" y2="180" stroke="#27ae60" stroke-width="3"/>
            <text x="720" y="100" fill="#27ae60" font-size="10" font-weight="bold">苏联</text>
            
            <!-- 韩日海峡标注 -->
            <text x="50" y="450" fill="#2980b9" font-size="12" font-weight="bold">日本海</text>
            <text x="50" y="550" fill="#2980b9" font-size="12" font-weight="bold">黄海</text>
          </g>
          
          <!-- 标题 -->
          <text x="400" y="30" fill="#1a1a2e" font-size="20" text-anchor="middle" font-weight="bold">朝鲜半岛地形图</text>
        </svg>
      </div>
      
      <!-- 图例 -->
      <div class="map-legend">
        <div class="legend-item">
          <div class="legend-icon city"></div>
          <span class="legend-text">主要城市</span>
        </div>
        <div class="legend-item">
          <div class="legend-icon mountain"></div>
          <span class="legend-text">山脉地形</span>
        </div>
        <div class="legend-item">
          <div class="legend-icon river"></div>
          <span class="legend-text">河流</span>
        </div>
        <div class="legend-item">
          <span style="color: #e74c3c; font-weight: bold;">- - -</span>
          <span class="legend-text">38度线</span>
        </div>
        <div class="legend-item">
          <div class="legend-icon" style="background: #9b59b6; border-radius: 0;"></div>
          <span class="legend-text">战略要点</span>
        </div>
        <div class="legend-item">
          <div class="legend-icon border"></div>
          <span class="legend-text">国境线</span>
        </div>
      </div>
      
      <!-- 信息面板 -->
      <div class="info-panel">
        <div class="info-card">
          <h3>🏔️ 主要山脉</h3>
          <ul>
            <li>白头山（长白山）海拔2718米</li>
            <li>狼林山脉纵贯朝鲜北部</li>
            <li>妙香山为著名旅游胜地</li>
            <li>太白山脉位于朝鲜半岛东部</li>
          </ul>
        </div>
        
        <div class="info-card">
          <h3>🌊 主要河流</h3>
          <ul>
            <li>鸭绿江是中朝界河</li>
            <li>图们江是中朝苏界河</li>
            <li>大同江流经平壤</li>
            <li>清川江是重要战略通道</li>
          </ul>
        </div>
        
        <div class="info-card">
          <h3>🎯 战略要点</h3>
          <ul>
            <li>长津湖战役发生地</li>
            <li>上甘岭战役发生地</li>
            <li>铁原是志愿军后勤枢纽</li>
            <li>砥平里为军事重镇</li>
          </ul>
        </div>
      </div>
    </div>
  </main>
  
  <script>
    function goBack() {
      window.location.href = '/learning-support.html';
    }
  </script>
</body>
</html>
