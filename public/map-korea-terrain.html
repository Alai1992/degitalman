<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>朝鲜半岛地形图 - 抗美援朝数字展馆</title>
    <link rel="stylesheet" href="map-korea-terrain.css">
</head>
<body>
    <div class="map-container">
        <header class="map-header">
            <button class="back-btn" onclick="goBack()">
                <span class="back-icon">←</span>
                <span>返回知识宝库</span>
            </button>
            <h1 class="map-title">朝鲜半岛地形图</h1>
        </header>

        <div class="map-content">
            <!-- 地图主图 -->
            <div class="map-wrapper">
                <div class="map-frame">
                    <svg viewBox="0 0 800 600" class="korea-map">
                        <!-- 背景 -->
                        <defs>
                            <linearGradient id="landGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#e8dcc8"/>
                                <stop offset="100%" style="stop-color:#d4c4a8"/>
                            </linearGradient>
                            <linearGradient id="seaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#b8d4e8"/>
                                <stop offset="100%" style="stop-color:#9cc4dc"/>
                            </linearGradient>
                            <filter id="shadow">
                                <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.3"/>
                            </filter>
                        </defs>

                        <!-- 海洋背景 -->
                        <rect x="0" y="0" width="800" height="600" fill="url(#seaGradient)" rx="5"/>
                        
                        <!-- 朝鲜半岛主体 -->
                        <path d="M 520 280 
                                 L 530 250 L 540 240 L 555 235 L 570 230 
                                 L 585 225 L 600 220 L 615 225 L 630 235 
                                 L 645 240 L 660 245 L 675 250 L 690 255 
                                 L 705 260 L 710 270 L 705 280 L 700 290 
                                 L 695 300 L 700 310 L 695 320 L 690 330 
                                 L 695 340 L 700 350 L 710 355 L 720 350 
                                 L 730 340 L 740 330 L 750 320 L 760 310 
                                 L 770 300 L 775 290 L 780 280 L 775 270 
                                 L 770 260 L 760 255 L 750 260 L 740 265 
                                 L 730 260 L 720 255 L 710 250 L 700 255 
                                 L 690 260 L 680 265 L 670 270 L 660 275 
                                 L 650 280 L 640 285 L 630 290 L 620 295 
                                 L 610 290 L 600 285 L 590 280 L 580 285 
                                 L 570 290 L 560 285 L 550 280 L 540 275 
                                 L 530 280 L 520 280 Z" 
                              fill="url(#landGradient)" stroke="#8b7355" stroke-width="2" filter="url(#shadow)"/>
                        
                        <!-- 38度线 -->
                        <line x1="530" y1="285" x2="755" y2="275" 
                              stroke="#c41e3a" stroke-width="2.5" stroke-dasharray="8,4" opacity="0.8"/>
                        
                        <!-- 鸭绿江 -->
                        <path d="M 400 50 L 410 80 L 420 120 L 430 160 L 440 200 L 450 240 L 460 260" 
                              stroke="#4a90c2" stroke-width="4" fill="none" stroke-linecap="round"/>
                        
                        <!-- 图们江 -->
                        <path d="M 480 30 L 490 60 L 500 90 L 510 110 L 520 130" 
                              stroke="#4a90c2" stroke-width="3" fill="none" stroke-linecap="round"/>
                        
                        <!-- 大同江 -->
                        <path d="M 570 200 L 580 220 L 590 240 L 600 260 L 610 280" 
                              stroke="#4a90c2" stroke-width="3" fill="none" stroke-linecap="round"/>
                        
                        <!-- 清川江 -->
                        <path d="M 510 180 L 520 200 L 530 220 L 540 240 L 545 260" 
                              stroke="#4a90c2" stroke-width="3" fill="none" stroke-linecap="round"/>
                        
                        <!-- 临津江 -->
                        <path d="M 630 240 L 640 255 L 650 270 L 660 285" 
                              stroke="#4a90c2" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                        
                        <!-- 汉江 -->
                        <path d="M 670 260 L 680 275 L 690 290 L 700 300 L 710 310" 
                              stroke="#4a90c2" stroke-width="3.5" fill="none" stroke-linecap="round"/>
                        
                        <!-- 洛东江 -->
                        <path d="M 720 340 L 730 355 L 740 370 L 745 385 L 750 400" 
                              stroke="#4a90c2" stroke-width="3" fill="none" stroke-linecap="round"/>
                        
                        <!-- 礼成江 -->
                        <path d="M 680 320 L 690 335 L 700 345 L 710 355" 
                              stroke="#4a90c2" stroke-width="2" fill="none" stroke-linecap="round"/>

                        <!-- 长津湖 -->
                        <circle cx="455" cy="100" r="8" fill="#4a90c2" stroke="#2d5a7b" stroke-width="1.5"/>
                        
                        <!-- 赴战湖 -->
                        <circle cx="470" cy="85" r="6" fill="#4a90c2" stroke="#2d5a7b" stroke-width="1.5"/>
                        
                        <!-- 虚川湖 -->
                        <circle cx="490" cy="75" r="5" fill="#4a90c2" stroke="#2d5a7b" stroke-width="1"/>

                        <!-- 白头山 -->
                        <polygon points="430,70 420,90 440,90" fill="#5a8f5a" stroke="#3d6b3d" stroke-width="1"/>
                        <text x="430" y="65" font-size="9" fill="#3d6b3d" text-anchor="middle" font-weight="bold">白头山</text>
                        <text x="430" y="105" font-size="8" fill="#5a8f5a" text-anchor="middle">2718m</text>

                        <!-- 妙香山 -->
                        <polygon points="500,140 492,155 508,155" fill="#5a8f5a" stroke="#3d6b3d" stroke-width="1"/>
                        <text x="500" y="135" font-size="8" fill="#3d6b3d" text-anchor="middle">妙香山</text>

                        <!-- 狼林山脉 -->
                        <text x="480" y="160" font-size="9" fill="#5a8f5a" font-weight="bold">狼林山脉</text>
                        <line x1="460" y1="155" x2="500" y2="155" stroke="#5a8f5a" stroke-width="1.5"/>
                        
                        <!-- 太白山脉 -->
                        <text x="560" y="180" font-size="9" fill="#5a8f5a" font-weight="bold">太白山脉</text>
                        <line x1="540" y1="175" x2="580" y2="175" stroke="#5a8f5a" stroke-width="1.5"/>

                        <!-- 首都标注 -->
                        <circle cx="570" cy="270" r="8" fill="#c41e3a" stroke="#8b0000" stroke-width="2"/>
                        <text x="570" y="265" font-size="10" fill="#1a1a1a" text-anchor="middle" font-weight="bold">平壤</text>
                        
                        <circle cx="680" cy="305" r="8" fill="#c41e3a" stroke="#8b0000" stroke-width="2"/>
                        <text x="680" y="300" font-size="10" fill="#1a1a1a" text-anchor="middle" font-weight="bold">汉城</text>
                        <text x="680" y="322" font-size="8" fill="#555" text-anchor="middle">(首尔)</text>

                        <!-- 主要城市 -->
                        <circle cx="440" cy="240" r="5" fill="#e67e22" stroke="#c0610a" stroke-width="1"/>
                        <text x="440" y="258" font-size="8" fill="#333" text-anchor="middle">新义州</text>

                        <circle cx="510" cy="210" r="5" fill="#e67e22" stroke="#c0610a" stroke-width="1"/>
                        <text x="510" y="225" font-size="8" fill="#333" text-anchor="middle">价川</text>

                        <circle cx="490" cy="180" r="5" fill="#e67e22" stroke="#c0610a" stroke-width="1"/>
                        <text x="490" y="195" font-size="8" fill="#333" text-anchor="middle">安州</text>

                        <circle cx="470" cy="150" r="5" fill="#e67e22" stroke="#c0610a" stroke-width="1"/>
                        <text x="470" y="165" font-size="8" fill="#333" text-anchor="middle">熙川</text>

                        <circle cx="525" cy="225" r="4" fill="#e67e22" stroke="#c0610a" stroke-width="1"/>
                        <text x="525" y="238" font-size="7" fill="#333" text-anchor="middle">球场</text>

                        <circle cx="545" cy="250" r="4" fill="#e67e22" stroke="#c0610a" stroke-width="1"/>
                        <text x="545" y="263" font-size="7" fill="#333" text-anchor="middle">肃川</text>

                        <circle cx="575" cy="235" r="4" fill="#e67e22" stroke="#c0610a" stroke-width="1"/>
                        <text x="575" y="248" font-size="7" fill="#333" text-anchor="middle">沙里院</text>

                        <circle cx="620" cy="260" r="4" fill="#e67e22" stroke="#c0610a" stroke-width="1"/>
                        <text x="620" y="273" font-size="7" fill="#333" text-anchor="middle">开城</text>

                        <circle cx="550" cy="200" r="4" fill="#e67e22" stroke="#c0610a" stroke-width="1"/>
                        <text x="550" y="213" font-size="7" fill="#333" text-anchor="middle">顺川</text>

                        <circle cx="600" cy="215" r="4" fill="#e67e22" stroke="#c0610a" stroke-width="1"/>
                        <text x="600" y="228" font-size="7" fill="#333" text-anchor="middle">黄州</text>

                        <circle cx="460" cy="130" r="4" fill="#e67e22" stroke="#c0610a" stroke-width="1"/>
                        <text x="460" y="143" font-size="7" fill="#333" text-anchor="middle">水丰</text>

                        <!-- 战略要地 -->
                        <rect x="448" y="93" width="14" height="14" fill="#e67e22" stroke="#c0610a" stroke-width="1" transform="rotate(45 455 100)"/>
                        <text x="455" y="118" font-size="7" fill="#c0610a" text-anchor="middle" font-weight="bold">长津湖</text>

                        <rect x="608" y="278" width="10" height="10" fill="#e67e22" stroke="#c0610a" stroke-width="1" transform="rotate(45 613 283)"/>
                        <text x="613" y="298" font-size="7" fill="#c0610a" text-anchor="middle" font-weight="bold">铁原</text>

                        <rect x="650" y="280" width="10" height="10" fill="#e67e22" stroke="#c0610a" stroke-width="1" transform="rotate(45 655 285)"/>
                        <text x="655" y="300" font-size="7" fill="#c0610a" text-anchor="middle" font-weight="bold">横城</text>

                        <!-- 港口城市 -->
                        <circle cx="655" cy="290" r="5" fill="#8e44ad" stroke="#6c3483" stroke-width="1"/>
                        <text x="655" y="305" font-size="8" fill="#333" text-anchor="middle">仁川</text>

                        <circle cx="750" cy="395" r="6" fill="#8e44ad" stroke="#6c3483" stroke-width="1"/>
                        <text x="750" y="410" font-size="8" fill="#333" text-anchor="middle">釜山</text>

                        <circle cx="620" cy="150" r="5" fill="#8e44ad" stroke="#6c3483" stroke-width="1"/>
                        <text x="620" y="165" font-size="8" fill="#333" text-anchor="middle">元山</text>

                        <circle cx="580" cy="110" r="5" fill="#8e44ad" stroke="#6c3483" stroke-width="1"/>
                        <text x="580" y="125" font-size="8" fill="#333" text-anchor="middle">咸兴</text>

                        <circle cx="530" cy="60" r="5" fill="#8e44ad" stroke="#6c3483" stroke-width="1"/>
                        <text x="530" y="75" font-size="8" fill="#333" text-anchor="middle">清津</text>

                        <circle cx="740" cy="350" r="5" fill="#8e44ad" stroke="#6c3483" stroke-width="1"/>
                        <text x="740" y="365" font-size="8" fill="#333" text-anchor="middle">大邱</text>

                        <circle cx="710" cy="370" r="5" fill="#8e44ad" stroke="#6c3483" stroke-width="1"/>
                        <text x="710" y="385" font-size="8" fill="#333" text-anchor="middle">大田</text>

                        <circle cx="730" cy="420" r="4" fill="#8e44ad" stroke="#6c3483" stroke-width="1"/>
                        <text x="730" y="433" font-size="7" fill="#333" text-anchor="middle">光州</text>

                        <circle cx="690" cy="315" r="4" fill="#8e44ad" stroke="#6c3483" stroke-width="1"/>
                        <text x="690" y="328" font-size="7" fill="#333" text-anchor="middle">水原</text>

                        <!-- 标签标注 -->
                        <text x="60" y="100" font-size="10" fill="#4a90c2" font-weight="bold">黄海</text>
                        <text x="200" y="50" font-size="10" fill="#4a90c2" font-weight="bold">图们江</text>
                        <text x="300" y="150" font-size="10" fill="#4a90c2" font-weight="bold">鸭绿江</text>
                        <text x="650" y="130" font-size="10" fill="#4a90c2" font-weight="bold">日本海</text>
                        <text x="500" y="550" font-size="10" fill="#4a90c2" font-weight="bold">朝鲜海峡</text>

                        <!-- 38度线标注 -->
                        <text x="640" y="260" font-size="9" fill="#c41e3a" font-weight="bold" transform="rotate(-5 640 260)">38°线</text>

                        <!-- 中朝边境标注 -->
                        <text x="380" y="160" font-size="9" fill="#5a8f5a" font-weight="bold">中朝边境</text>
                    </svg>
                    
                    <!-- 图例 -->
                    <div class="map-legend">
                        <h3>图例说明</h3>
                        <div class="legend-item">
                            <span class="legend-icon city-capital"></span>
                            <span class="legend-text">首都</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-icon city-main"></span>
                            <span class="legend-text">主要城市</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-icon city-port"></span>
                            <span class="legend-text">港口城市</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-icon river"></span>
                            <span class="legend-text">河流</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-icon lake"></span>
                            <span class="legend-text">湖泊</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-icon mountain"></span>
                            <span class="legend-text">山脉</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-icon strategic"></span>
                            <span class="legend-text">战略要地</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-icon line-38"></span>
                            <span class="legend-text">38°军事分界线</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-icon border-china"></span>
                            <span class="legend-text">中朝边境</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 信息卡片 -->
            <div class="info-cards">
                <div class="info-card">
                    <h3>朝鲜半岛概况</h3>
                    <p>位于东亚朝鲜半岛，北接中国和俄罗斯，东临日本海，西濒黄海，南隔朝鲜海峡与日本相望。总面积约22万平方公里。</p>
                </div>
                <div class="info-card">
                    <h3>主要山脉</h3>
                    <p>北部为盖马高原和白头山（最高峰2718米），中部为狼林山脉和太白山脉，形成天然地理屏障。</p>
                </div>
                <div class="info-card">
                    <h3>主要河流</h3>
                    <p>鸭绿江和图们江为中朝界河，大同江、清川江、临津江、汉江为主要河流，水系发达。</p>
                </div>
                <div class="info-card">
                    <h3>战略意义</h3>
                    <p>半岛地势北高南低，三面环海。38度线将南北分开，形成对峙的军事格局，具有重要战略意义。</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function goBack() {
            const tab = sessionStorage.getItem('lastTab') || 'documents';
            window.location.href = `learning-support.html?tab=${tab}`;
        }
        
        // 页面加载时标记当前tab
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const tab = urlParams.get('tab') || 'documents';
            sessionStorage.setItem('lastTab', tab);
        });
    </script>
</body>
</html>
