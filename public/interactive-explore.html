<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="互动探究 - 与老兵对话" />
    <title>互动探究 - 抗美援朝老兵数字人</title>
    <link href="https://fonts.googleapis.cn/css2?family=Noto+Serif+SC:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/interactive-explore.css">
    <style>
      /* 语音开关弹窗样式 */
      .voice-modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.85);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      
      .voice-modal.hidden {
        display: none;
      }
      
      .voice-modal-content {
        background: linear-gradient(135deg, #2a1a0a 0%, #1a0f05 100%);
        border: 3px solid #daa520;
        border-radius: 15px;
        padding: 2.5rem;
        text-align: center;
        max-width: 420px;
        box-shadow: 0 0 50px rgba(218, 165, 32, 0.3);
        animation: modalFadeIn 0.3s ease;
      }
      
      @keyframes modalFadeIn {
        from {
          opacity: 0;
          transform: scale(0.9);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      
      .voice-modal-icon {
        font-size: 4rem;
        margin-bottom: 1rem;
      }
      
      .voice-modal-title {
        font-size: 1.6rem;
        color: #daa520;
        margin-bottom: 0.5rem;
        font-weight: 700;
      }
      
      .voice-modal-desc {
        font-size: 1rem;
        color: #c4a35a;
        margin-bottom: 2rem;
        line-height: 1.6;
      }
      
      .voice-modal-buttons {
        display: flex;
        gap: 1rem;
        justify-content: center;
      }
      
      .voice-modal-btn {
        padding: 0.8rem 2rem;
        border: 2px solid #daa520;
        border-radius: 8px;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        font-family: 'Noto Serif SC', serif;
      }
      
      .voice-modal-btn.enable {
        background: linear-gradient(135deg, #daa520, #b8860b);
        color: #1a0f05;
      }
      
      .voice-modal-btn.enable:hover {
        background: linear-gradient(135deg, #ffd700, #daa520);
        transform: translateY(-2px);
        box-shadow: 0 5px 20px rgba(218, 165, 32, 0.4);
      }
      
      .voice-modal-btn.disable {
        background: transparent;
        color: #c4a35a;
      }
      
      .voice-modal-btn.disable:hover {
        background: rgba(218, 165, 32, 0.1);
        color: #daa520;
      }
    </style>
  </head>
  <body class="antialiased">
    <!-- 语音开关弹窗 -->
    <div class="voice-modal" id="voiceModal">
      <div class="voice-modal-content">
        <div class="voice-modal-icon">🎙️</div>
        <h2 class="voice-modal-title">是否开启语音对话？</h2>
        <p class="voice-modal-desc">开启后，老兵的回复将以语音形式自动播放</p>
        <div class="voice-modal-buttons">
          <button class="voice-modal-btn enable" id="voiceEnable">开启</button>
          <button class="voice-modal-btn disable" id="voiceDisable">不开启</button>
        </div>
      </div>
    </div>

    <div id="app">
      <!-- 互动探究页面 -->
      <div class="explore-page">
        <!-- 战火背景 -->
        <div class="war-background"></div>
        
        <!-- 返回按钮 -->
        <button class="back-button" id="backBtn">
          <span class="back-icon">←</span>
          返回主页
        </button>
        
        <!-- 页面大标题 - 居中显示 -->
        <header class="main-header">
          <div class="main-title-badge">
            <span class="badge-icon">🔍</span>
            互动探究
          </div>
          <h1 class="main-title">与老兵对话</h1>
          <p class="main-subtitle">聆听老兵讲述峥嵘岁月</p>
        </header>
        
        <!-- 内容区域 - 照片和对话框 -->
        <div class="content-section">
          <!-- 左侧老兵半身照片 -->
          <div class="veteran-portrait">
            <div class="portrait-frame">
              <img src="/veteran-avatar.jpg" alt="老兵" class="portrait-img">
            </div>
          </div>

          <!-- 右侧对话区域 -->
          <div class="chat-wrapper">
            <!-- 聊天区域 -->
            <div class="chat-container">
              <!-- 聊天消息区域 -->
              <div class="chat-messages" id="chatMessages">
                <!-- 欢迎消息 -->
                <div class="message bot-message">
                  <div class="message-avatar"><img src="/veteran-avatar.jpg" alt="" class="avatar-img"></div>
                  <div class="message-content">
                    <div class="message-text">
                      孩子，有什么想了解的，尽管问吧。
                    </div>
                    <div class="message-audio" style="display:none;">
                      <audio class="message-audio-player"></audio>
                      <button class="audio-play-btn" title="播放语音">▶</button>
                    </div>
                  </div>
                </div>
              </div>

              <!-- 输入区域 -->
              <div class="chat-input-area">
                <button class="voice-input-btn" id="voiceInputBtn" title="按住说话">
                  <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/>
                    <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                  </svg>
                </button>
                <input 
                  type="text" 
                  class="chat-input" 
                  id="chatInput" 
                  placeholder="请输入您的问题..."
                >
                <button class="send-button" id="sendBtn">发送</button>
              </div>
            </div>

            <!-- 快捷问题 -->
            <div class="quick-questions">
              <div class="quick-title">试试这些问题</div>
              <div class="quick-buttons">
                <button class="quick-btn" data-question="长津湖战役的故事">长津湖战役的故事</button>
                <button class="quick-btn" data-question="上甘岭战役有多激烈">上甘岭战役有多激烈</button>
                <button class="quick-btn" data-question="战士的日常生活">战士的日常生活</button>
                <button class="quick-btn" data-question="上甘岭精神">上甘岭精神</button>
                <button class="quick-btn" data-question="冰雕连的故事">冰雕连的故事</button>
                <button class="quick-btn" data-question="后勤补给情况">后勤补给情况</button>
                <button class="quick-btn" data-question="最难忘的战斗">最难忘的战斗</button>
                <button class="quick-btn" data-question="战后生活">战后生活</button>
                <button class="quick-btn" data-question="战争的意义">战争的意义</button>
                <button class="quick-btn" data-question="想念的战友">想念的战友</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      window.onload = function() {
        var currentAudio = null;
        var currentAudioBtn = null;
        var voiceEnabled = false; // 是否开启语音
        var welcomeTTSGenerated = false; // 欢迎语TTS是否已生成
        var recognition = null; // 语音识别对象
        var isRecording = false; // 是否正在录音
        var recordedText = ''; // 录制的文本
        var voiceInputBtn = document.getElementById('voiceInputBtn');
        var chatInput = document.getElementById('chatInput');
        
        // 初始化语音识别
        function initSpeechRecognition() {
          if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = true;
            recognition.lang = 'zh-CN';
            
            recognition.onstart = function() {
              isRecording = true;
              recordedText = '';
              voiceInputBtn.classList.add('recording');
            };
            
            recognition.onresult = function(event) {
              var interimTranscript = '';
              for (var i = event.resultIndex; i < event.results.length; i++) {
                var transcript = event.results[i][0].transcript;
                if (event.results[i].isFinal) {
                  recordedText += transcript;
                } else {
                  interimTranscript += transcript;
                }
              }
              chatInput.value = recordedText + interimTranscript;
            };
            
            recognition.onerror = function(event) {
              console.error('语音识别错误:', event.error);
              isRecording = false;
              voiceInputBtn.classList.remove('recording');
            };
            
            recognition.onend = function() {
              isRecording = false;
              voiceInputBtn.classList.remove('recording');
              if (recordedText.trim()) {
                chatInput.value = recordedText.trim();
                sendMessage();
              } else {
                chatInput.value = '';
              }
            };
          } else {
            console.warn('当前浏览器不支持语音识别');
            if (voiceInputBtn) voiceInputBtn.style.display = 'none';
          }
        }
        
        // 语音输入按钮事件
        if (voiceInputBtn) {
          voiceInputBtn.addEventListener('mousedown', function(e) {
            e.preventDefault();
            if (recognition && !isRecording) {
              try { recognition.start(); } catch(e) { console.error('启动语音识别失败:', e); }
            }
          });
          
          voiceInputBtn.addEventListener('mouseup', function(e) {
            e.preventDefault();
            voiceInputBtn.classList.remove('recording');
            if (recognition && isRecording) recognition.stop();
          });
          
          voiceInputBtn.addEventListener('mouseleave', function() {
            voiceInputBtn.classList.remove('recording');
            if (recognition && isRecording) recognition.stop();
          });
          
          voiceInputBtn.addEventListener('touchstart', function(e) {
            e.preventDefault();
            if (recognition && !isRecording) {
              try { recognition.start(); } catch(e) { console.error('启动语音识别失败:', e); }
            }
          });
          
          voiceInputBtn.addEventListener('touchend', function(e) {
            e.preventDefault();
            voiceInputBtn.classList.remove('recording');
            if (recognition && isRecording) recognition.stop();
          });
        }
        
        initSpeechRecognition();
        
        // 语音开关弹窗
        var voiceModal = document.getElementById('voiceModal');
        var voiceEnableBtn = document.getElementById('voiceEnable');
        var voiceDisableBtn = document.getElementById('voiceDisable');
        
        // 生成TTS语音
        function generateTTS(text, callback) {
          fetch('/api/tts/stream', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: text })
          })
          .then(function(response) {
            if (!response.ok) throw new Error('TTS失败');
            return response.blob();
          })
          .then(function(blob) {
            var audioUrl = URL.createObjectURL(blob);
            callback(audioUrl);
          })
          .catch(function(err) {
            console.error('TTS error:', err);
            callback(null);
          });
        }
        
        // 停止当前播放的语音
        function stopCurrentAudio() {
          if (currentAudio) {
            currentAudio.pause();
            currentAudio.currentTime = 0;
            if (currentAudioBtn) {
              currentAudioBtn.textContent = '▶';
            }
            currentAudio = null;
            currentAudioBtn = null;
          }
        }
        
        // 播放/暂停语音
        function toggleAudio(audio, btn) {
          if (currentAudio && currentAudio !== audio) {
            currentAudio.pause();
            currentAudio.currentTime = 0;
            if (currentAudioBtn) currentAudioBtn.textContent = '▶';
          }
          
          if (audio.paused) {
            audio.play();
            btn.textContent = '⏸';
            currentAudio = audio;
            currentAudioBtn = btn;
          } else {
            audio.pause();
            btn.textContent = '▶';
            currentAudio = null;
            currentAudioBtn = null;
          }
        }
        
        // 自动播放欢迎语语音
        function playWelcomeTTS() {
          if (!voiceEnabled || welcomeTTSGenerated) return;
          
          // 停止当前播放的音频
          stopCurrentAudio();
          
          var welcomeText = '孩子，有什么想了解的，尽管问吧。';
          var firstMessage = document.querySelector('.bot-message');
          if (!firstMessage) return;
          
          var audioContainer = firstMessage.querySelector('.message-audio');
          var audioEl = firstMessage.querySelector('.message-audio-player');
          var audioBtn = firstMessage.querySelector('.audio-play-btn');
          
          if (!audioEl || !audioBtn) return;
          
          generateTTS(welcomeText, function(audioUrl) {
            if (audioUrl) {
              welcomeTTSGenerated = true;
              audioEl.src = audioUrl;
              audioEl.playbackRate = 1.0; // 正常语速
              audioBtn.style.display = 'inline-block';
              
              audioEl.play().then(function() {
                audioBtn.textContent = '⏸';
                currentAudio = audioEl;
                currentAudioBtn = audioBtn;
              }).catch(function(e) {
                console.log('Auto-play blocked:', e);
              });
              
              // 绑定音频按钮
              audioBtn.onclick = function() {
                toggleAudio(audioEl, audioBtn);
              };
              audioEl.onended = function() {
                audioBtn.textContent = '▶';
                currentAudio = null;
                currentAudioBtn = null;
              };
            }
          });
        }
        
        // 开启语音
        voiceEnableBtn.onclick = function() {
          voiceEnabled = true;
          voiceModal.classList.add('hidden');
          // 播放欢迎语语音
          playWelcomeTTS();
        };
        
        // 不开启语音
        voiceDisableBtn.onclick = function() {
          voiceEnabled = false;
          voiceModal.classList.add('hidden');
        };
        
        // 初始化音频按钮点击事件（后续动态生成的按钮也需要绑定）
        document.querySelectorAll('.audio-play-btn').forEach(function(btn) {
          btn.onclick = function() {
            var audioContainer = this.parentElement;
            var audio = audioContainer.querySelector('.message-audio-player');
            toggleAudio(audio, this);
          };
        });

        // 音频播放结束
        document.querySelectorAll('.message-audio-player').forEach(function(audio) {
          audio.onended = function() {
            var btn = this.parentElement.querySelector('.audio-play-btn');
            if (btn) btn.textContent = '▶';
            currentAudio = null;
            currentAudioBtn = null;
          };
        });

        // 返回按钮
        var backBtn = document.getElementById('backBtn');
        if (backBtn) {
          backBtn.onclick = function() {
            window.location.href = '/';
          };
        }

        // 发送消息
        var chatInput = document.getElementById('chatInput');
        var sendBtn = document.getElementById('sendBtn');
        var chatMessages = document.getElementById('chatMessages');

        function sendMessage() {
          var question = chatInput.value.trim();
          if (!question) return;

          // 添加用户消息
          var userDiv = document.createElement('div');
          userDiv.className = 'message user-message';
          userDiv.innerHTML = '<div class="message-avatar"><img src="/student-avatar.jpg" alt="" class="avatar-img"></div><div class="message-content"><div class="message-text">' + question + '</div></div>';
          chatMessages.appendChild(userDiv);
          chatInput.value = '';

          // 滚动到底部
          chatMessages.scrollTop = chatMessages.scrollHeight;

          // 添加加载动画
          var loadingDiv = document.createElement('div');
          loadingDiv.className = 'message bot-message loading';
          loadingDiv.innerHTML = '<div class="message-avatar"><img src="/veteran-avatar.jpg" alt="" class="avatar-img"></div><div class="message-content"><div class="message-text">...</div></div>';
          chatMessages.appendChild(loadingDiv);
          chatMessages.scrollTop = chatMessages.scrollHeight;

          // 调用API
          fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              messages: Array.from(chatMessages.querySelectorAll('.message')).map(function(m) {
                return m.classList.contains('user-message') ? 
                  { role: 'user', content: m.querySelector('.message-text').textContent } :
                  { role: 'assistant', content: m.querySelector('.message-text').textContent };
              }),
              userMessage: question
            })
          })
          .then(function(response) { return response.text(); })
          .then(function(text) {
            chatMessages.removeChild(loadingDiv);
            var botDiv = document.createElement('div');
            botDiv.className = 'message bot-message';
            botDiv.innerHTML = '<div class="message-avatar"><img src="/veteran-avatar.jpg" alt="" class="avatar-img"></div><div class="message-content"><div class="message-text"></div><div class="message-audio"><audio class="message-audio-player"></audio><button class="audio-play-btn" title="播放语音">▶</button></div></div>';
            chatMessages.appendChild(botDiv);
            
            var targetDiv = botDiv.querySelector('.message-text');
            var audioEl = botDiv.querySelector('.message-audio-player');
            var audioBtn = botDiv.querySelector('.audio-play-btn');
            var fullText = text;
            var i = 0;
            var ttsReady = false;
            var ttsAudio = null;
            
            // 立即开始生成TTS（在打字开始时就请求）
            if (voiceEnabled) {
              generateTTS(fullText, function(audioUrl) {
                if (audioUrl) {
                  ttsAudio = new Audio(audioUrl);
                  ttsAudio.playbackRate = 1.0; // 正常语速
                  
                  if (ttsReady) {
                    // 打字已完成，停止当前音频后播放
                    stopCurrentAudio();
                    audioEl.src = audioUrl;
                    audioEl.play().then(function() {
                      audioBtn.textContent = '⏸';
                      currentAudio = audioEl;
                      currentAudioBtn = audioBtn;
                    }).catch(function(e) {
                      console.log('Auto-play blocked:', e);
                    });
                  } else {
                    // 等待打字完成后再播放
                    ttsReady = true;
                  }
                }
              });
            }
            
            // 显示播放按钮
            audioBtn.style.display = 'inline-block';
            
            // 打字机效果
            function typeWriter() {
              if (i < text.length) {
                targetDiv.textContent += text.charAt(i);
                i++;
                chatMessages.scrollTop = chatMessages.scrollHeight;
                setTimeout(typeWriter, 30); // 打字速度加快
              } else {
                // 打字完成
                ttsReady = true;
                
                if (voiceEnabled && audioEl.src) {
                  // TTS已准备好，停止当前音频后播放
                  stopCurrentAudio();
                  audioEl.play().then(function() {
                    audioBtn.textContent = '⏸';
                    currentAudio = audioEl;
                    currentAudioBtn = audioBtn;
                  }).catch(function(e) {
                    console.log('Auto-play blocked:', e);
                  });
                }
              }
            }
            typeWriter();
            
            // 绑定音频按钮
            audioBtn.onclick = function() {
              if (!audioEl.src) {
                generateTTS(fullText, function(audioUrl) {
                  if (audioUrl) {
                    audioEl.src = audioUrl;
                    toggleAudio(audioEl, audioBtn);
                  }
                });
              } else {
                toggleAudio(audioEl, audioBtn);
              }
            };
            audioEl.onended = function() {
              audioBtn.textContent = '▶';
              currentAudio = null;
              currentAudioBtn = null;
            };
          })
          .catch(function(err) {
            chatMessages.removeChild(loadingDiv);
            var errDiv = document.createElement('div');
            errDiv.className = 'message bot-message';
            errDiv.innerHTML = '<div class="message-avatar"><img src="/veteran-avatar.jpg" alt="" class="avatar-img"></div><div class="message-content"><div class="message-text">抱歉，网络出问题了，请稍后再试。</div></div>';
            chatMessages.appendChild(errDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
          });
        }

        if (sendBtn) sendBtn.onclick = sendMessage;
        if (chatInput) {
          chatInput.onkeypress = function(e) {
            if (e.key === 'Enter') sendMessage();
          };
        }

        // 快捷问题点击
        document.querySelectorAll('.quick-btn').forEach(function(btn) {
          btn.onclick = function() {
            chatInput.value = this.getAttribute('data-question');
            sendMessage();
          };
        });
      };
    </script>
  </body>
</html>
