<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="互动探究 - 与老兵对话" />
    <title>互动探究 - 抗美援朝老兵数字人</title>
    <link href="https://fonts.googleapis.cn/css2?family=Noto+Serif+SC:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/interactive-explore.css">
  </head>
  <body class="antialiased">
    <div id="app">
      <!-- 互动探究页面 -->
      <div class="explore-page">
        <!-- 战火背景 -->
        <div class="war-background"></div>
        
        <!-- 返回按钮 -->
        <button class="back-button" id="backBtn">
          <span class="back-icon">←</span>
          返回主页
        </button>
        
        <!-- 页面大标题 - 居中显示 -->
        <header class="main-header">
          <div class="main-title-badge">
            <span class="badge-icon">🔍</span>
            互动探究
          </div>
          <h1 class="main-title">与老兵对话</h1>
          <p class="main-subtitle">聆听老兵讲述峥嵘岁月</p>
        </header>
        
        <!-- 内容区域 - 照片和对话框 -->
        <div class="content-section">
          <!-- 左侧老兵半身照片 -->
          <div class="veteran-portrait">
            <div class="portrait-frame">
              <img src="/veteran-avatar.jpg" alt="老兵" class="portrait-img">
            </div>
          </div>

          <!-- 右侧对话区域 -->
          <div class="chat-wrapper">
            <!-- 聊天区域 -->
            <div class="chat-container">
              <!-- 聊天消息区域 -->
              <div class="chat-messages" id="chatMessages">
                <!-- 欢迎消息 -->
                <div class="message bot-message">
                  <div class="message-avatar"><img src="/veteran-avatar.jpg" alt="" class="avatar-img"></div>
                  <div class="message-content">
                    <div class="message-text">
                      孩子，有什么想了解的，尽管问吧。
                    </div>
                  </div>
                </div>
              </div>

              <!-- 输入区域 -->
              <div class="chat-input-area">
                <input 
                  type="text" 
                  class="chat-input" 
                  id="chatInput" 
                  placeholder="请输入您的问题..."
                >
                <button class="voice-button" id="voiceBtn" title="按住说话">
                  <span class="voice-icon">🎤</span>
                </button>
                <button class="send-button" id="sendBtn">发送</button>
              </div>
            </div>

            <!-- 快捷问题 -->
            <div class="quick-questions">
              <div class="quick-title">试试这些问题</div>
              <div class="quick-buttons">
                <button class="quick-btn" data-question="长津湖战役的故事">长津湖战役的故事</button>
                <button class="quick-btn" data-question="上甘岭战役有多激烈">上甘岭战役有多激烈</button>
                <button class="quick-btn" data-question="战士的日常生活">战士的日常生活</button>
                <button class="quick-btn" data-question="上甘岭精神">上甘岭精神</button>
                <button class="quick-btn" data-question="冰雕连的故事">冰雕连的故事</button>
                <button class="quick-btn" data-question="后勤补给情况">后勤补给情况</button>
                <button class="quick-btn" data-question="最难忘的战斗">最难忘的战斗</button>
                <button class="quick-btn" data-question="战后生活">战后生活</button>
                <button class="quick-btn" data-question="战争的意义">战争的意义</button>
                <button class="quick-btn" data-question="想念的战友">想念的战友</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      window.onload = function() {
        // 返回按钮
        var backBtn = document.getElementById('backBtn');
        if (backBtn) {
          backBtn.onclick = function() {
            window.location.href = '/';
          };
        }

        // 发送消息
        var chatInput = document.getElementById('chatInput');
        var sendBtn = document.getElementById('sendBtn');
        var chatMessages = document.getElementById('chatMessages');

        function sendMessage() {
          var question = chatInput.value.trim();
          if (!question) return;

          // 添加用户消息
          var userDiv = document.createElement('div');
          userDiv.className = 'message user-message';
          userDiv.innerHTML = '<div class="message-avatar"><img src="/student-avatar.jpg" alt="" class="avatar-img"></div><div class="message-content"><div class="message-text">' + question + '</div></div>';
          chatMessages.appendChild(userDiv);
          chatInput.value = '';

          // 滚动到底部
          chatMessages.scrollTop = chatMessages.scrollHeight;

          // 添加加载动画
          var loadingDiv = document.createElement('div');
          loadingDiv.className = 'message bot-message loading';
          loadingDiv.innerHTML = '<div class="message-avatar"><img src="/veteran-avatar.jpg" alt="" class="avatar-img"></div><div class="message-content"><div class="message-text">...</div></div>';
          chatMessages.appendChild(loadingDiv);
          chatMessages.scrollTop = chatMessages.scrollHeight;

          // 调用API
          fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              messages: Array.from(chatMessages.querySelectorAll('.message')).map(function(m) {
                return m.classList.contains('user-message') ? 
                  { role: 'user', content: m.querySelector('.message-text').textContent } :
                  { role: 'assistant', content: m.querySelector('.message-text').textContent };
              }),
              userMessage: question
            })
          })
          .then(function(response) { return response.text(); })
          .then(function(text) {
            chatMessages.removeChild(loadingDiv);
            var botDiv = document.createElement('div');
            botDiv.className = 'message bot-message';
            botDiv.innerHTML = '<div class="message-avatar"><img src="/veteran-avatar.jpg" alt="" class="avatar-img"></div><div class="message-content"><div class="message-text"></div></div>';
            chatMessages.appendChild(botDiv);
            var targetDiv = botDiv.querySelector('.message-text');
            var i = 0;
            function typeWriter() {
              if (i < text.length) {
                targetDiv.textContent += text.charAt(i);
                i++;
                chatMessages.scrollTop = chatMessages.scrollHeight;
                setTimeout(typeWriter, 50);
              }
            }
            typeWriter();
          })
          .catch(function(err) {
            chatMessages.removeChild(loadingDiv);
            var errDiv = document.createElement('div');
            errDiv.className = 'message bot-message';
            errDiv.innerHTML = '<div class="message-avatar"><img src="/veteran-avatar.jpg" alt="" class="avatar-img"></div><div class="message-content"><div class="message-text">抱歉，网络出问题了，请稍后再试。</div></div>';
            chatMessages.appendChild(errDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
          });
        }

        if (sendBtn) sendBtn.onclick = sendMessage;
        if (chatInput) {
          chatInput.onkeypress = function(e) {
            if (e.key === 'Enter') sendMessage();
          };
        }

        // 语音输入功能 - 使用后端API进行语音识别
        var voiceBtn = document.getElementById('voiceBtn');
        var mediaRecorder = null;
        var audioChunks = [];
        var isRecording = false;
        var recognitionTimeout = null;

        function resetVoiceButton() {
          isRecording = false;
          if (recognitionTimeout) {
            clearTimeout(recognitionTimeout);
            recognitionTimeout = null;
          }
          if (voiceBtn) {
            voiceBtn.classList.remove('recording');
            var icon = voiceBtn.querySelector('.voice-icon');
            if (icon) icon.textContent = '🎤';
          }
        }

        async function startRecording() {
          if (isRecording) return;

          try {
            // 请求麦克风权限
            var stream = await navigator.mediaDevices.getUserMedia({ audio: true });

            audioChunks = [];
            // 使用 ogg opus 格式（豆包ASR支持）
            var oggFormat = 'audio/ogg;codecs=opus';
            var useOgg = MediaRecorder.isTypeSupported(oggFormat);
            var audioFormat = useOgg ? oggFormat : (MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' : 'audio/webm');
            
            mediaRecorder = new MediaRecorder(stream, {
              mimeType: audioFormat
            });

            mediaRecorder.ondataavailable = function(event) {
              if (event.data.size > 0) {
                audioChunks.push(event.data);
              }
            };

            mediaRecorder.onstop = async function() {
              // 停止所有音轨
              stream.getTracks().forEach(function(track) { track.stop(); });

              if (audioChunks.length === 0) {
                resetVoiceButton();
                return;
              }

              // 转换为base64
              var blob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
              var reader = new FileReader();

              reader.onloadend = function() {
                var base64Audio = reader.result.split(',')[1];

                // 发送到后端API识别
                fetch('/api/asr', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ audioData: base64Audio })
                })
                .then(function(response) { return response.json(); })
                .then(function(data) {
                  resetVoiceButton();
                  if (data.text) {
                    chatInput.value = data.text;
                    sendMessage();
                  } else {
                    alert('未识别到语音，请重试');
                  }
                })
                .catch(function(err) {
                  console.error('识别失败:', err);
                  resetVoiceButton();
                  alert('语音识别失败，请重试');
                });
              };

              reader.readAsDataURL(blob);
            };

            mediaRecorder.start();
            isRecording = true;
            if (voiceBtn) {
              voiceBtn.classList.add('recording');
              var icon = voiceBtn.querySelector('.voice-icon');
              if (icon) icon.textContent = '🔴';
            }

          } catch (err) {
            console.error('录音失败:', err);
            resetVoiceButton();
            if (err.name === 'NotAllowedError') {
              alert('无法访问麦克风，请允许麦克风权限后重试');
            } else {
              alert('录音失败，请重试');
            }
          }
        }

        function stopRecording() {
          if (!isRecording || !mediaRecorder) return;
          try {
            mediaRecorder.stop();
          } catch (err) {
            console.error('停止录音失败:', err);
            resetVoiceButton();
          }
        }

        if (voiceBtn) {
          // 按下鼠标开始录音
          voiceBtn.onmousedown = function(e) {
            e.preventDefault();
            startRecording();
          };

          // 松开鼠标停止录音
          voiceBtn.onmouseup = function(e) {
            e.preventDefault();
            stopRecording();
          };

          // 鼠标离开按钮也停止
          voiceBtn.onmouseleave = function(e) {
            if (isRecording) {
              stopRecording();
            }
          };

          // 触摸事件支持移动端
          voiceBtn.ontouchstart = function(e) {
            e.preventDefault();
            startRecording();
          };

          voiceBtn.ontouchend = function(e) {
            e.preventDefault();
            stopRecording();
          };
        }

        // 快捷问题点击
        document.querySelectorAll('.quick-btn').forEach(function(btn) {
          btn.onclick = function() {
            chatInput.value = this.getAttribute('data-question');
            sendMessage();
          };
        });
      };
    </script>
  </body>
</html>
